<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Activity Feed Test</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1e293b;
            color: #f1f5f9;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: #1e293b;
        }
        h1 { color: #6366f1; margin-bottom: 10px; }
        button {
            padding: 12px 24px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 10px 5px 10px 0;
        }
        button:hover { background: #4f46e5; }
        .activity-feed {
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .activity-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .activity-item.success { border-left: 4px solid #10b981; }
        .activity-item.error { border-left: 4px solid #ef4444; }
        .timestamp { color: #64748b; font-size: 0.875rem; }
        .status { 
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 10px;
        }
        .status.success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status.error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #dc2626;
        }
        pre {
            background: #0f172a;
            color: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.875rem;
        }
        .log {
            background: #0f172a;
            color: #10b981;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📊 Activity Feed Test</h1>
        <p>Testing activity feed loading with cache bypass</p>
        
        <div>
            <button onclick="loadActivity()">🔄 Load Activity</button>
            <button onclick="loadActivityNoCache()">🚀 Load (No Cache)</button>
            <button onclick="testAPI()">🔍 Test API</button>
            <button onclick="clearCache()">🗑️ Clear Cache & Reload</button>
        </div>
        
        <div id="logs"></div>
        <div id="activityFeed" class="activity-feed"></div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = 'log';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(entry);
            console.log(message);
        }

        async function loadActivity() {
            addLog('Loading activity (normal)...');
            const feedEl = document.getElementById('activityFeed');
            feedEl.innerHTML = '<div class="loading">⏳ Loading activity...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/activity?limit=15`);
                addLog(`Response status: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const logs = await response.json();
                addLog(`Received ${logs.length} activities`);
                renderActivity(logs);
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
                feedEl.innerHTML = `<div class="error-box">❌ Error: ${error.message}</div>`;
            }
        }

        async function loadActivityNoCache() {
            addLog('Loading activity (no cache)...');
            const feedEl = document.getElementById('activityFeed');
            feedEl.innerHTML = '<div class="loading">⏳ Loading activity...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/activity?limit=15&t=${Date.now()}`, {
                    cache: 'no-cache',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                addLog(`Response status: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const logs = await response.json();
                addLog(`Received ${logs.length} activities`);
                renderActivity(logs);
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
                feedEl.innerHTML = `<div class="error-box">❌ Error: ${error.message}</div>`;
            }
        }

        async function testAPI() {
            addLog('Testing API directly...');
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                addLog(`API Health: ${JSON.stringify(data)}`);
                
                const response2 = await fetch(`${API_BASE}/activity?limit=5`);
                const data2 = await response2.json();
                addLog(`Activity API: ${data2.length} items returned`);
                
                document.getElementById('activityFeed').innerHTML = `
                    <pre>${JSON.stringify(data2, null, 2)}</pre>
                `;
            } catch (error) {
                addLog(`API Test Error: ${error.message}`, 'error');
            }
        }

        function clearCache() {
            addLog('Clearing cache and reloading...');
            cache.keys().then(keys => {
                keys.forEach(key => cache.delete(key));
                addLog('Cache cleared');
                location.reload();
            });
        }

        function renderActivity(logs) {
            const feedEl = document.getElementById('activityFeed');
            
            if (!logs || logs.length === 0) {
                feedEl.innerHTML = '<div class="loading">📭 No activity found</div>';
                return;
            }
            
            feedEl.innerHTML = logs.map(log => {
                const statusClass = log.status === 'success' ? 'success' : 'error';
                const details = log.details || {};
                let recipient = '';
                
                if (log.action === 'send_email') {
                    recipient = `To: ${details.to || 'N/A'}`;
                } else if (log.action === 'send_whatsapp') {
                    recipient = `Phone: ${details.phone || 'N/A'}`;
                } else if (log.action === 'post_linkedin') {
                    recipient = 'Profile: LinkedIn';
                }
                
                return `
                    <div class="activity-item ${statusClass}">
                        <div><strong>${log.action}</strong> 
                            <span class="status ${statusClass}">${log.status}</span>
                        </div>
                        <div style="margin: 8px 0;">${recipient}</div>
                        <div class="timestamp">🕐 ${new Date(log.timestamp).toLocaleString()}</div>
                        ${log.error ? `<div style="color: #ef4444; margin-top: 8px;">⚠️ ${log.error}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Auto-load on page load
        window.addEventListener('load', () => {
            addLog('Page loaded, testing API...');
            setTimeout(testAPI, 500);
        });
    </script>
</body>
</html>
